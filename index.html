<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尋味記 | The Gastronomy Chronicle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 1. 首页入口大厅 (Home View) -->
  <div class="view-container active" id="homeView">
    <!-- 右上角登录状态栏 -->
    <div class="user-status-bar-home">
      <button class="auth-trigger-btn" id="openAuthModalBtnHome">管理员登录</button>
      <div class="user-info-wrapper" id="userInfoWrapperHome" style="display: none;">
        <span class="username-display" id="usernameDisplayHome"></span>
        <button class="logout-btn" id="logoutBtnHome">退出</button>
      </div>
    </div>

    <!-- 首页视觉巨幕 -->
    <div class="home-hero-section">
      <div class="hero-brand">
        <h1 class="hero-title">尋味記</h1>
        <p class="hero-subtitle">The Gastronomy & Mixology Chronicle</p>
        <span class="hero-divider"></span>
        <p class="hero-tagline">记录每一道亲手调制的温存，与每一次在街角偶遇的惊艳</p>
      </div>

      <!-- 双大分类导航卡片 -->
      <div class="nav-cards-container">
        <!-- 入口 A：手作风味 -->
        <div class="nav-card" id="enterCreationsBtn">
          <div class="nav-card-bg" style="background-image: url('images/gourmet_dish.jpg');"></div>
          <div class="nav-card-content">
            <span class="nav-card-badge">Creations</span>
            <h2>手作风味</h2>
            <p>记录我亲手烹煮的食物与调配的酒水，那份专注的温度</p>
            <span class="enter-arrow">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
              </svg>
            </span>
          </div>
        </div>

        <!-- 入口 B：探店寻味 -->
        <div class="nav-card" id="enterTastingsBtn">
          <div class="nav-card-bg" style="background-image: url('images/tasting_steak.jpg');"></div>
          <div class="nav-card-content">
            <span class="nav-card-badge">Tastings</span>
            <h2>探店寻味</h2>
            <p>记录我在外界品尝到的精美菜肴与醇香酒浆，那一瞬的惊艳</p>
            <span class="enter-arrow">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
              </svg>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 2. 子列表页面视口 (List View - 共享自制与品尝) -->
  <div class="view-container" id="listView">
    <!-- 子页面头部面包屑与导航 -->
    <header class="sub-header">
      <div class="nav-breadcrumb">
        <button class="back-btn" id="backToHomeBtn">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
          </svg>
          返回首页
        </button>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current" id="breadcrumbCurrent">手作风味</span>
      </div>
      
      <!-- 右上角用户状态栏 -->
      <div class="user-status-bar" id="userStatusBar">
        <button class="auth-trigger-btn" id="openAuthModalBtn">管理员登录</button>
        <div class="user-info-wrapper" id="userInfoWrapper" style="display: none;">
          <span class="username-display" id="usernameDisplay"></span>
          <button class="logout-btn" id="logoutBtn">退出</button>
        </div>
      </div>

      <div class="sub-logo-section">
        <h2 id="subPageTitle">手作风味</h2>
        <p id="subPageDesc">记录我亲手烹煮的食物与调配的酒汁</p>
      </div>
    </header>

    <!-- 控制器区域：分类与添加按钮 -->
    <div class="controls-container">
      <div class="tabs-wrapper">
        <div class="filter-tabs">
          <button class="tab-btn active" data-filter="all">全部品类</button>
          <button class="tab-btn" data-filter="food">精选美食</button>
          <button class="tab-btn" data-filter="drinks">风味饮料</button>
        </div>
        <div class="sub-filter-tabs" id="drinksSubTabs">
          <button class="sub-tab-btn active" data-subfilter="drinks-all">全部饮料</button>
          <button class="sub-tab-btn" data-subfilter="non-alcoholic">无酒精饮料</button>
          <button class="sub-tab-btn" data-subfilter="alcoholic">含酒精饮料</button>
        </div>
      </div>
      
      <!-- 仅在登录后显示的添加按钮 -->
      <button class="add-btn" id="openModalBtn" style="display: none;">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        添加品物
      </button>
    </div>

    <!-- 卡片网格展示区 -->
    <main class="grid-section">
      <div class="cards-grid" id="cardsGrid">
        <!-- 卡片动态渲染 -->
      </div>
    </main>
  </div>

  <!-- 添加品物的模态框 (Modal) -->
  <div class="modal" id="addModal">
    <div class="modal-content">
      <button class="modal-close" id="closeModalBtn">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      
      <h2 id="addModalTitle">添加新卡片</h2>
      
      <form id="addForm">
        <!-- 类别选择 -->
        <div class="form-group">
          <label for="itemType">分类类别</label>
          <select id="itemType" required>
            <option value="food">精选美食 (Food)</option>
            <option value="non-alcoholic">无酒精饮料 (Non-Alcoholic)</option>
            <option value="alcoholic">含酒精饮料 (Alcoholic)</option>
          </select>
        </div>
        
        <!-- 品物名称 -->
        <div class="form-group">
          <label for="itemName">品物名称</label>
          <input type="text" id="itemName" placeholder="例如：法式慢炖和牛 / 经典莫吉托" required autocomplete="off">
        </div>
        
        <!-- 品物描述 -->
        <div class="form-group">
          <label for="itemDescription">描述说明</label>
          <textarea id="itemDescription" rows="3" placeholder="写一点关于这道美食或调酒的故事、口感或配方..." required></textarea>
        </div>
        
        <!-- 图片上传 -->
        <div class="form-group">
          <label>上传图片</label>
          <div class="file-upload-wrapper" id="uploadWrapper">
            <svg class="upload-icon" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span class="upload-text" id="uploadText">点击或拖拽上传图片</span>
            <input type="file" id="itemImage" accept="image/*" required>
            <img class="upload-preview" id="imagePreview" alt="预览">
          </div>
        </div>
        
        <!-- 提交动作 -->
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancelBtn">取消</button>
          <button type="submit" class="btn-primary">确认添加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 登录与注册的模态框 (Auth Modal) -->
  <div class="modal" id="authModal">
    <div class="modal-content">
      <button class="modal-close" id="closeAuthModalBtn">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      
      <h2 id="authModalTitle">管理员登录</h2>
      
      <form id="authForm">
        <!-- 用户名 -->
        <div class="form-group">
          <label for="authUsername">用户名</label>
          <input type="text" id="authUsername" placeholder="请输入用户名" required autocomplete="username">
        </div>
        
        <!-- 密码 -->
        <div class="form-group">
          <label for="authPassword">密码</label>
          <input type="password" id="authPassword" placeholder="请输入密码" required autocomplete="current-password" style="width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: var(--border-radius-md); padding: 12px 16px; color: var(--text-main); font-family: inherit; font-size: 0.95rem; transition: var(--transition-smooth); -webkit-text-security: disc;">
        </div>
        
        <!-- 切换及提交 -->
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="authSwitchBtn">切换到注册</button>
          <button type="submit" class="btn-primary" id="authSubmitBtn">立即登录</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 品物详情模态框 (Detail Modal) -->
  <div class="modal" id="detailModal">
    <div class="modal-content" style="max-width: 600px; padding: 0; overflow: hidden;">
      <button class="modal-close" id="closeDetailModalBtn" style="top: 16px; right: 16px; background: rgba(8, 6, 7, 0.5); color: #fff; width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); display: flex; justify-content: center; align-items: center; z-index: 10;">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      
      <div class="detail-img-wrapper">
        <span class="card-badge" id="detailBadge"></span>
        <img id="detailImage" src="" alt="食品饮料大图">
      </div>
      
      <div class="detail-body">
        <h2 class="detail-title" id="detailTitle"></h2>
        <p class="detail-description" id="detailDescription"></p>
        <div class="detail-meta">
          <span id="detailCreator"></span>
          <span id="detailDate"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
